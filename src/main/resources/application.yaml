spring:
  application:
    name: clientes-cuentas-microservicio


  datasource:
    url: jdbc:h2:mem:clientescuentas
    driver-class-name: org.h2.Driver
    username: 1234
    password: 1234

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs